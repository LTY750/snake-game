<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 贪吃蛇</title>
    <!-- 🔧 FIX: 用手绘 SVG 替代 emoji favicon，小尺寸下清晰可辨 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='16' width='100' height='100' fill='%230f3460'/><path d='M20 55 Q20 30 40 30 Q55 30 55 45 Q55 55 45 55 Q35 55 35 65 Q35 80 55 80 Q70 80 80 70' stroke='%234CAF50' stroke-width='10' fill='none' stroke-linecap='round'/><circle cx='42' cy='38' r='3' fill='white'/><circle cx='42' cy='38' r='1.5' fill='%23000'/></svg>">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            --font-mono: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', 'Courier New', monospace;

            --bg-1: #1a1a2e;
            --bg-2: #16213e;
            --bg-3: #0f3460;
            --accent: #4CAF50;
            --accent-light: #8BC34A;
            --accent-dark: #2E7D32;
            --danger: #ff6b6b;
            --glow-1: #4CAF50;
            --glow-2: #ff6b6b;
            --canvas-1: #0d1b2a;
            --canvas-2: #1b263b;
        }

        body[data-theme="sunset"] {
            --bg-1: #2d1b4e; --bg-2: #4a1942; --bg-3: #7a2048;
            --accent: #ff9a44; --accent-light: #ffc371; --accent-dark: #c97119;
            --danger: #ff6b9d; --glow-1: #ff9a44; --glow-2: #ff6b9d;
            --canvas-1: #1a0f2a; --canvas-2: #2a1535;
        }
        body[data-theme="ocean"] {
            --bg-1: #0a2540; --bg-2: #0e3b5c; --bg-3: #0a4d6e;
            --accent: #00d4ff; --accent-light: #7df9ff; --accent-dark: #0099cc;
            --danger: #ff6b9d; --glow-1: #00d4ff; --glow-2: #0099ff;
            --canvas-1: #051a2a; --canvas-2: #0a2540;
        }
        body[data-theme="neon"] {
            --bg-1: #0f0524; --bg-2: #1a0f3e; --bg-3: #2d0b4e;
            --accent: #b537f2; --accent-light: #e57bff; --accent-dark: #7a1fa6;
            --danger: #ff0080; --glow-1: #b537f2; --glow-2: #00ffff;
            --canvas-1: #0a0418; --canvas-2: #170a30;
        }
        body[data-theme="cherry"] {
            --bg-1: #1a0a14; --bg-2: #3d0e2d; --bg-3: #5a1547;
            --accent: #ff4081; --accent-light: #ff80ab; --accent-dark: #c2185b;
            --danger: #ffeb3b; --glow-1: #ff4081; --glow-2: #ffeb3b;
            --canvas-1: #1a0612; --canvas-2: #2d0a20;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--font-sans);
            background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
            overflow-x: hidden;
            color: #fff;
            position: relative;
            padding: 20px;
            transition: background 0.6s ease;
        }

        body::before, body::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            z-index: 0;
            animation: float 10s ease-in-out infinite;
            transition: background 0.6s ease;
        }
        body::before { background: var(--glow-1); top: -100px; left: -100px; }
        body::after { background: var(--glow-2); bottom: -100px; right: -100px; animation-delay: -5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 50px); }
        }

        .game-container {
            display: flex;
            align-items: stretch;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            z-index: 1;
            position: relative;
            transition: gap 0.4s ease;
        }

        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .game-panel {
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 🔧 FIX: 蛇形标志用 SVG 内联替代 emoji，跨平台一致且清晰 */
        .game-title {
            font-family: var(--font-mono);
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent-light), #FFC107);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
            margin-bottom: 16px;
            text-align: center;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .snake-icon {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            filter: drop-shadow(0 0 6px var(--accent));
        }

        .canvas-wrap {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(76, 175, 80, 0.3),
                        inset 0 0 0 2px rgba(255, 255, 255, 0.1);
        }

        #gameCanvas { display: block; background: var(--canvas-1); }

        .canvas-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(10, 20, 40, 0.7);
            backdrop-filter: blur(4px);
            font-family: var(--font-mono);
            font-size: 22px;
            color: #fff;
            letter-spacing: 2px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .canvas-overlay.show { opacity: 1; }
        .canvas-overlay span {
            padding: 12px 24px;
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.5);
            border-radius: 12px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .control-panel {
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-width: 240px;
        }

        .theme-picker {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            justify-content: center;
        }
        .theme-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.2);
            transition: all 0.2s;
            position: relative;
        }
        .theme-dot:hover { transform: scale(1.15); }
        .theme-dot.active {
            border-color: #fff;
            transform: scale(1.2);
            box-shadow: 0 0 12px currentColor;
        }
        .theme-dot[data-theme="emerald"] { background: linear-gradient(135deg, #4CAF50, #ff6b6b); color: #4CAF50; }
        .theme-dot[data-theme="sunset"]  { background: linear-gradient(135deg, #ff9a44, #ff6b9d); color: #ff9a44; }
        .theme-dot[data-theme="ocean"]   { background: linear-gradient(135deg, #00d4ff, #0099ff); color: #00d4ff; }
        .theme-dot[data-theme="neon"]    { background: linear-gradient(135deg, #b537f2, #00ffff); color: #b537f2; }
        .theme-dot[data-theme="cherry"]  { background: linear-gradient(135deg, #ff4081, #ffeb3b); color: #ff4081; }

        .score-box { width: 100%; text-align: center; }

        .score-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 4px;
            font-family: var(--font-mono);
        }

        .score-value {
            font-family: var(--font-mono);
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            transition: transform 0.2s;
        }
        .score-value.bump { animation: bump 0.3s ease; }
        @keyframes bump {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .best-score {
            font-size: 13px;
            color: rgba(255, 215, 0, 0.8);
            margin-top: 6px;
            letter-spacing: 1px;
            font-family: var(--font-mono);
        }

        .speed-indicator {
            font-size: 11px;
            color: rgba(135, 206, 250, 0.8);
            margin-top: 4px;
            letter-spacing: 1px;
            font-family: var(--font-mono);
        }

        .start-btn {
            margin: 20px 0;
            padding: 14px 36px;
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(76, 175, 80, 0.4);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .start-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(76, 175, 80, 0.6);
        }
        .start-btn:hover::before { opacity: 1; }
        .start-btn:active { transform: translateY(0); }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 200px;
            transition: all 0.3s ease;
        }

        /* 🔧 FIX: 按钮反馈 — 分离 hover/active 的 transition 时长 */
        .control-btn {
            width: 60px;
            height: 60px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            cursor: pointer;
            /* 🔧 FIX: hover 用 0.2s 缓入，active 瞬间响应（0s） */
            transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.15s;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        .control-btn:hover {
            background: rgba(76, 175, 80, 0.25);
            border-color: rgba(76, 175, 80, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.2);
        }
        /* 🔧 FIX: active 状态 — 强对比色 + 缩放 + 发光，transition 极短 */
        .control-btn:active {
            transform: scale(0.88);
            background: var(--accent);
            border-color: var(--accent-light);
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.6), inset 0 0 8px rgba(255,255,255,0.3);
            transition: background 0s, border-color 0s, transform 0.08s, box-shadow 0s;
        }
        /* 🔧 FIX: 触摸按下时用 JS 添加 .pressed 类，模拟 :active */
        .control-btn.pressed {
            transform: scale(0.88);
            background: var(--accent);
            border-color: var(--accent-light);
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.6), inset 0 0 8px rgba(255,255,255,0.3);
            transition: background 0s, border-color 0s, transform 0.08s, box-shadow 0s;
        }

        #up { grid-column: 2; }
        #left { grid-column: 1; grid-row: 2; }
        #right { grid-column: 3; grid-row: 2; }
        #down { grid-column: 2; grid-row: 3; }

        body.playing .control-btn {
            width: 80px;
            height: 80px;
            font-size: 32px;
            border-radius: 20px;
        }
        body.playing .controls {
            width: 264px;
            gap: 12px;
        }

        .history-panel {
            padding: 24px;
            width: 260px;
            display: flex;
            flex-direction: column;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        body.playing .history-panel {
            opacity: 0;
            transform: translateX(40px) scale(0.9);
            pointer-events: none;
            position: absolute;
            right: -20px;
            top: 50%;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .history-header h3 {
            font-family: var(--font-mono);
            font-size: 16px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .clear-btn {
            font-size: 11px;
            padding: 6px 12px;
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.4);
            border-radius: 20px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
            font-family: var(--font-mono);
        }
        .clear-btn:hover {
            background: rgba(255, 107, 107, 0.4);
            color: #fff;
        }

        .history-list {
            list-style: none;
            flex: 1;
            overflow-y: auto;
            max-height: 400px;
            padding-right: 4px;
        }
        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            font-size: 13px;
            transition: all 0.2s;
            animation: slideIn 0.4s ease;
        }
        .history-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-2px);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .history-left { display: flex; align-items: center; gap: 10px; }

        .history-rank {
            width: 26px;
            height: 26px;
            line-height: 26px;
            text-align: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            font-weight: bold;
            font-size: 11px;
            font-family: var(--font-mono);
        }

        .history-item.top1 .history-rank {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        .history-item.top2 .history-rank {
            background: linear-gradient(135deg, #E0E0E0, #9E9E9E);
            color: #fff;
        }
        .history-item.top3 .history-rank {
            background: linear-gradient(135deg, #CD7F32, #8B4513);
            color: #fff;
        }

        .history-score {
            font-family: var(--font-mono);
            font-weight: 700;
            color: var(--accent-light);
            font-size: 15px;
        }

        .history-date {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.5px;
            font-family: var(--font-mono);
        }

        .empty-history {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            padding: 40px 0;
            line-height: 1.8;
        }
        .empty-history .emoji {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            padding: 14px 28px;
            background: rgba(76, 175, 80, 0.95);
            color: #fff;
            border-radius: 30px;
            font-family: var(--font-mono);
            letter-spacing: 2px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { background: rgba(255, 107, 107, 0.95); }

        @media (max-width: 768px) {
            .game-title { font-size: 22px; }
            .snake-icon { width: 28px; height: 28px; }
            .score-value { font-size: 36px; }
            .history-panel { width: 100%; max-width: 360px; }
            body.playing .control-btn {
                width: 72px;
                height: 72px;
                font-size: 28px;
            }
            body.playing .controls { width: 240px; }
            body.playing .history-panel { display: none; }
        }
    </style>
</head>

<body data-theme="emerald">
    <div class="game-container">
        <div class="game-panel glass">
            <!-- 🔧 FIX: 用 SVG 蛇形图标替代 emoji -->
            <div class="game-title">
                <svg class="snake-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 52 C18 30, 38 22, 50 22 C62 22, 68 30, 68 40 C68 50, 58 54, 50 54 C42 54, 34 58, 34 68 C34 80, 50 84, 66 84 C78 84, 86 76, 86 76"
                          stroke="url(#snakeGrad)" stroke-width="9" stroke-linecap="round" fill="none"/>
                    <circle cx="44" cy="32" r="4" fill="white"/>
                    <circle cx="44" cy="32" r="2" fill="#111"/>
                    <defs>
                        <linearGradient id="snakeGrad" x1="18" y1="22" x2="86" y2="84">
                            <stop offset="0%" stop-color="#8BC34A"/>
                            <stop offset="100%" stop-color="#2E7D32"/>
                        </linearGradient>
                    </defs>
                </svg>
                SNAKE GAME
            </div>
            <div class="canvas-wrap">
                <canvas id="gameCanvas" width="360" height="360"></canvas>
                <div class="canvas-overlay show" id="overlay"><span>点击开始游戏</span></div>
            </div>
        </div>

        <div class="control-panel glass">
            <div class="theme-picker" id="themePicker">
                <div class="theme-dot active" data-theme="emerald" title="翡翠"></div>
                <div class="theme-dot" data-theme="sunset" title="日落"></div>
                <div class="theme-dot" data-theme="ocean" title="海洋"></div>
                <div class="theme-dot" data-theme="neon" title="霓虹"></div>
                <div class="theme-dot" data-theme="cherry" title="樱桃"></div>
            </div>
            <div class="score-box">
                <div class="score-label">SCORE</div>
                <div class="score-value" id="score">0</div>
                <div class="best-score" id="best">🏆 BEST: 0</div>
                <div class="speed-indicator" id="speed">⚡ SPEED: 1.0x</div>
            </div>
            <button class="start-btn" id="startBtn">START</button>
            <div class="controls">
                <button id="up" class="control-btn">↑</button>
                <button id="left" class="control-btn">←</button>
                <button id="right" class="control-btn">→</button>
                <button id="down" class="control-btn">↓</button>
            </div>
        </div>

        <div class="history-panel glass">
            <div class="history-header">
                <h3>🏆 LEADERBOARD</h3>
                <button class="clear-btn" id="clearBtn">CLEAR</button>
            </div>
            <ul class="history-list" id="historyList"></ul>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ========== DOM 引用 ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const bestElement = document.getElementById('best');
        const speedElement = document.getElementById('speed');
        const startBtn = document.getElementById('startBtn');
        const historyList = document.getElementById('historyList');
        const clearBtn = document.getElementById('clearBtn');
        const overlay = document.getElementById('overlay');
        const toastEl = document.getElementById('toast');
        const themePicker = document.getElementById('themePicker');

        // ========== 常量 ==========
        const GRID_SIZE = 18;
        const TILE_COUNT = canvas.width / GRID_SIZE;
        const STEP_INITIAL = 200;
        const STEP_MIN = 70;
        const SPEED_STEP = 6;
        const HISTORY_KEY = 'snake_history_v2';
        const THEME_KEY = 'snake_theme';
        const MAX_HISTORY = 10;
        const SWIPE_THRESHOLD = 15;
        const HEAD_RADIUS = 6;
        const BODY_RADIUS = 4;
        const EYE_RADIUS = 2.5;
        const PUPIL_RADIUS = 1.2;

        // ========== 游戏状态 ==========
        let snake, prevSnake, food, dx, dy, nextDx, nextDy, score;
        let stepInterval = STEP_INITIAL;
        let gameRunning = false;
        let lastStepTime = 0;
        let animFrameId = null;

        // 🔧 FIX: 方向输入队列 — 解决快速连按按键被吞的问题
        // 原来只有一个 nextDx/nextDy，快速按两次只有最后一次生效
        // 现在用队列缓冲，每次 step() 消费一个方向
        const dirQueue = [];
        const MAX_DIR_QUEUE = 3;  // 最多缓冲 3 个方向，防止堆积

        // ========== 主题颜色缓存 ==========
        let themeColors = {};

        function refreshThemeColors() {
            const style = getComputedStyle(document.body);
            themeColors = {
                accent:      style.getPropertyValue('--accent').trim()      || '#4CAF50',
                accentLight: style.getPropertyValue('--accent-light').trim() || '#8BC34A',
                accentDark:  style.getPropertyValue('--accent-dark').trim()  || '#2E7D32',
                danger:      style.getPropertyValue('--danger').trim()      || '#ff6b6b',
                canvas1:     style.getPropertyValue('--canvas-1').trim()    || '#0d1b2a',
                canvas2:     style.getPropertyValue('--canvas-2').trim()    || '#1b263b',
            };
            renderGridCache();
        }

        // ========== 离屏网格缓存 ==========
        const gridCanvas = document.createElement('canvas');
        gridCanvas.width = canvas.width;
        gridCanvas.height = canvas.height;
        const gridCtx = gridCanvas.getContext('2d');

        function renderGridCache() {
            gridCtx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
            gridCtx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            gridCtx.lineWidth = 1;
            gridCtx.beginPath();
            for (let i = 1; i < TILE_COUNT; i++) {
                gridCtx.moveTo(i * GRID_SIZE, 0);
                gridCtx.lineTo(i * GRID_SIZE, gridCanvas.height);
                gridCtx.moveTo(0, i * GRID_SIZE);
                gridCtx.lineTo(gridCanvas.width, i * GRID_SIZE);
            }
            gridCtx.stroke();
        }

        // ========== 主题切换 ==========
        function applyTheme(theme) {
            document.body.dataset.theme = theme;
            localStorage.setItem(THEME_KEY, theme);
            themePicker.querySelectorAll('.theme-dot').forEach(d => {
                d.classList.toggle('active', d.dataset.theme === theme);
            });
            refreshThemeColors();
        }

        themePicker.addEventListener('click', e => {
            const dot = e.target.closest('.theme-dot');
            if (dot) applyTheme(dot.dataset.theme);
        });

        applyTheme(localStorage.getItem(THEME_KEY) || 'emerald');

        // ========== Toast ==========
        let toastTimer = null;
        function showToast(msg, isError = false) {
            toastEl.textContent = msg;
            toastEl.classList.toggle('error', isError);
            toastEl.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
        }

        // ========== 历史记录 ==========
        function loadHistory() {
            try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
            catch { return []; }
        }

        function saveHistory(list) {
            localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
        }

        function addHistory(s) {
            if (s <= 0) return false;
            const list = loadHistory();
            const prevBest = list[0]?.score || 0;
            list.push({ score: s, date: Date.now() });
            list.sort((a, b) => b.score - a.score);
            saveHistory(list.slice(0, MAX_HISTORY));
            renderHistory();
            return s > prevBest;
        }

        function formatDate(ts) {
            const d = new Date(ts);
            const pad = n => String(n).padStart(2, '0');
            return `${d.getMonth() + 1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        function renderHistory() {
            const list = loadHistory();
            historyList.innerHTML = '';
            if (list.length === 0) {
                historyList.innerHTML = '<li class="empty-history"><span class="emoji">🎮</span>暂无记录<br>快去挑战吧！</li>';
                bestElement.textContent = '🏆 BEST: 0';
                return;
            }
            bestElement.textContent = `🏆 BEST: ${list[0].score}`;
            const fragment = document.createDocumentFragment();
            list.forEach((item, i) => {
                const li = document.createElement('li');
                li.className = 'history-item' + (i < 3 ? ' top' + (i + 1) : '');
                li.innerHTML = `
                    <div class="history-left">
                        <span class="history-rank">${i + 1}</span>
                        <span class="history-score">${item.score}</span>
                    </div>
                    <span class="history-date">${formatDate(item.date)}</span>
                `;
                fragment.appendChild(li);
            });
            historyList.appendChild(fragment);
        }

        clearBtn.addEventListener('click', () => {
            if (confirm('确定要清空所有历史记录吗？')) {
                localStorage.removeItem(HISTORY_KEY);
                renderHistory();
                showToast('记录已清空');
            }
        });

        // ========== 速度指示器 ==========
        function updateSpeedIndicator() {
            const ratio = STEP_INITIAL / stepInterval;
            speedElement.textContent = `⚡ SPEED: ${ratio.toFixed(1)}x`;
        }

        // ========== 初始化 ==========
        function init() {
            snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
            prevSnake = snake.map(s => ({ ...s }));
            food = { x: 15, y: 10 };
            dx = 1; dy = 0;
            nextDx = 1; nextDy = 0;
            dirQueue.length = 0;                                    // 🔧 FIX: 重置方向队列
            score = 0;
            stepInterval = STEP_INITIAL;
            updateScore();
            updateSpeedIndicator();
        }

        // ========== 游戏逻辑 ==========
        function step() {
            // 🔧 FIX: 从方向队列中取出下一个方向
            // 队列为空时保持当前 nextDx/nextDy
            while (dirQueue.length > 0) {
                const next = dirQueue.shift();
                // 检查是否与当前实际方向相反（用 dx/dy 而非 nextDx/nextDy）
                if (next.x !== -dx || next.y !== -dy) {
                    nextDx = next.x;
                    nextDy = next.y;
                    break;
                }
                // 如果是反向则跳过，继续看队列中下一个
            }

            dx = nextDx; dy = nextDy;
            prevSnake = snake.map(s => ({ ...s }));
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
                gameOver(); return;
            }

            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver(); return;
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateScore(true);
                generateFood();
                prevSnake.push({ ...snake[snake.length - 1] });
                stepInterval = Math.max(STEP_MIN, stepInterval - SPEED_STEP);
                updateSpeedIndicator();
            } else {
                snake.pop();
            }
        }

        function generateFood() {
            const occupied = new Set(snake.map(s => s.x * TILE_COUNT + s.y));
            let fx, fy;
            do {
                fx = Math.floor(Math.random() * TILE_COUNT);
                fy = Math.floor(Math.random() * TILE_COUNT);
            } while (occupied.has(fx * TILE_COUNT + fy));
            food.x = fx;
            food.y = fy;
        }

        // ========== 渲染 ==========
        function lerp(a, b, t) { return a + (b - a) * t; }

        function draw(interpolate) {
            const c = themeColors;

            const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            bg.addColorStop(0, c.canvas1);
            bg.addColorStop(1, c.canvas2);
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.drawImage(gridCanvas, 0, 0);

            // 食物
            const fx = food.x * GRID_SIZE + GRID_SIZE / 2;
            const fy = food.y * GRID_SIZE + GRID_SIZE / 2;
            const pulse = 1 + Math.sin(performance.now() / 200) * 0.1;

            const glow = ctx.createRadialGradient(fx, fy, 0, fx, fy, GRID_SIZE * 1.5);
            glow.addColorStop(0, c.danger + '66');
            glow.addColorStop(1, c.danger + '00');
            ctx.fillStyle = glow;
            ctx.fillRect(fx - GRID_SIZE * 1.5, fy - GRID_SIZE * 1.5, GRID_SIZE * 3, GRID_SIZE * 3);

            const grad = ctx.createRadialGradient(fx - 2, fy - 2, 1, fx, fy, GRID_SIZE / 2);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(0.4, c.danger);
            grad.addColorStop(1, c.accentDark);
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(fx, fy, (GRID_SIZE / 2 - 1) * pulse, 0, Math.PI * 2);
            ctx.fill();

            // 蛇身
            for (let i = snake.length - 1; i >= 0; i--) {
                const cur = snake[i];
                const prev = prevSnake[i] || cur;
                const x = lerp(prev.x, cur.x, interpolate) * GRID_SIZE;
                const y = lerp(prev.y, cur.y, interpolate) * GRID_SIZE;

                const isHead = i === 0;
                const progress = 1 - i / snake.length;

                const g = ctx.createLinearGradient(x, y, x + GRID_SIZE, y + GRID_SIZE);
                if (isHead) {
                    g.addColorStop(0, c.accentLight);
                    g.addColorStop(1, c.accentDark);
                } else {
                    g.addColorStop(0, c.accentLight);
                    g.addColorStop(1, c.accent);
                    ctx.globalAlpha = 0.55 + progress * 0.45;
                }
                ctx.fillStyle = g;
                ctx.beginPath();
                const r = isHead ? HEAD_RADIUS : BODY_RADIUS;
                if (ctx.roundRect) ctx.roundRect(x + 1, y + 1, GRID_SIZE - 2, GRID_SIZE - 2, r);
                else ctx.rect(x + 1, y + 1, GRID_SIZE - 2, GRID_SIZE - 2);
                ctx.fill();
                ctx.globalAlpha = 1;

                if (isHead) {
                    ctx.fillStyle = 'rgba(255,255,255,0.25)';
                    ctx.beginPath();
                    if (ctx.roundRect) ctx.roundRect(x + 3, y + 3, GRID_SIZE - 6, 4, 2);
                    ctx.fill();

                    const eyeOffsetX = dx * 2;
                    const eyeOffsetY = dy * 2;
                    const isHorizontal = dx !== 0;

                    const eye1x = x + (isHorizontal ? (dx > 0 ? GRID_SIZE - 7 : 5) : 4) + 2;
                    const eye1y = y + (isHorizontal ? 4 : (dy > 0 ? GRID_SIZE - 7 : 5)) + 2;
                    const eye2x = x + (isHorizontal ? (dx > 0 ? GRID_SIZE - 7 : 5) : GRID_SIZE - 8) + 2;
                    const eye2y = y + (isHorizontal ? GRID_SIZE - 8 : (dy > 0 ? GRID_SIZE - 7 : 5)) + 2;

                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(eye1x, eye1y, EYE_RADIUS, 0, Math.PI * 2);
                    ctx.arc(eye2x, eye2y, EYE_RADIUS, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(eye1x + eyeOffsetX, eye1y + eyeOffsetY, PUPIL_RADIUS, 0, Math.PI * 2);
                    ctx.arc(eye2x + eyeOffsetX, eye2y + eyeOffsetY, PUPIL_RADIUS, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // ========== 游戏循环 ==========
        function loop(now) {
            if (!gameRunning) return;
            if (!lastStepTime) lastStepTime = now;

            while (now - lastStepTime >= stepInterval) {
                step();
                lastStepTime += stepInterval;
                if (!gameRunning) { draw(1); return; }
            }

            const interpolate = Math.min(1, (now - lastStepTime) / stepInterval);
            draw(interpolate);
            animFrameId = requestAnimationFrame(loop);
        }

        function gameOver() {
            gameRunning = false;
            if (animFrameId) cancelAnimationFrame(animFrameId);
            startBtn.textContent = 'RESTART';
            overlay.querySelector('span').textContent = `💀 得分 ${score}`;
            overlay.classList.add('show');
            document.body.classList.remove('playing');
            const isNewBest = addHistory(score);
            setTimeout(() => {
                if (isNewBest && score > 0) showToast('🎉 新纪录！');
                else if (score > 0) showToast(`本局得分 ${score}`);
            }, 300);
        }

        function updateScore(bump = false) {
            scoreElement.textContent = score;
            if (bump) {
                scoreElement.classList.remove('bump');
                void scoreElement.offsetWidth;
                scoreElement.classList.add('bump');
            }
        }

        // ========== 方向控制 ==========
        // 🔧 FIX: 入队方向，而非直接设置 nextDx/nextDy
        // 这样快速连按 "上→左" 时两个方向都会被依次执行
        function enqueueDir(ndx, ndy) {
            if (dirQueue.length >= MAX_DIR_QUEUE) return;         // 队列满则丢弃
            // 检查是否与队列中最后一个方向（或当前方向）相同/相反
            const lastDir = dirQueue.length > 0
                ? dirQueue[dirQueue.length - 1]
                : { x: nextDx, y: nextDy };
            // 相同方向不重复入队
            if (ndx === lastDir.x && ndy === lastDir.y) return;
            // 反方向不入队（防止 180° 掉头）
            if (ndx === -lastDir.x && ndy === -lastDir.y) return;
            dirQueue.push({ x: ndx, y: ndy });
        }

        // 键盘
        document.addEventListener('keydown', e => {
            const map = {
                ArrowLeft:  [-1, 0], ArrowRight: [1, 0],
                ArrowUp:    [0, -1], ArrowDown:  [0, 1],
                a: [-1, 0], A: [-1, 0],
                d: [1, 0],  D: [1, 0],
                w: [0, -1], W: [0, -1],
                s: [0, 1],  S: [0, 1],
            };
            if (map[e.key]) {
                e.preventDefault();
                enqueueDir(...map[e.key]);                         // 🔧 FIX: 用队列替代直接设置
            }
        });

        // 🔧 FIX: 方向按钮 — 增强触摸反馈
        function bindDirectionBtn(id, ndx, ndy) {
            const el = document.getElementById(id);
            let pressTimer = null;

            // 触摸开始：立即响应方向 + 视觉反馈
            el.addEventListener('touchstart', e => {
                e.preventDefault();
                el.classList.add('pressed');                       // 🔧 FIX: 立即添加按下样式
                enqueueDir(ndx, ndy);
                // 150ms 后自动移除按下样式（模拟按键回弹）
                clearTimeout(pressTimer);
                pressTimer = setTimeout(() => el.classList.remove('pressed'), 150);
            }, { passive: false });

            // 触摸结束/离开：移除按下样式
            const release = () => {
                el.classList.remove('pressed');
                clearTimeout(pressTimer);
            };
            el.addEventListener('touchend', release);
            el.addEventListener('touchcancel', release);

            // 鼠标点击（非触摸设备）
            el.addEventListener('mousedown', e => {
                e.preventDefault();
                enqueueDir(ndx, ndy);
            });
        }

        bindDirectionBtn('up',    0, -1);
        bindDirectionBtn('down',  0,  1);
        bindDirectionBtn('left', -1,  0);
        bindDirectionBtn('right', 1,  0);

        // 开始按钮
        startBtn.addEventListener('click', () => {
            init();
            gameRunning = true;
            lastStepTime = 0;
            overlay.classList.remove('show');
            startBtn.textContent = 'RESTART';
            document.body.classList.add('playing');
            animFrameId = requestAnimationFrame(loop);
        });

        // 触屏滑动
        let touchStart = null;

        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (!touchStart) return;
            const touch = e.touches[0];
            const moveX = touch.clientX - touchStart.x;
            const moveY = touch.clientY - touchStart.y;
            if (Math.abs(moveX) < SWIPE_THRESHOLD && Math.abs(moveY) < SWIPE_THRESHOLD) return;
            if (Math.abs(moveX) > Math.abs(moveY)) {
                enqueueDir(moveX > 0 ? 1 : -1, 0);               // 🔧 FIX: 用队列
            } else {
                enqueueDir(0, moveY > 0 ? 1 : -1);
            }
            touchStart = { x: touch.clientX, y: touch.clientY };
        }, { passive: false });

        canvas.addEventListener('touchend', () => { touchStart = null; });

        // ========== 启动 ==========
        init();
        draw(0);
        renderHistory();
    </script>
</body>

</html>
