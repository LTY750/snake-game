<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 贪吃蛇</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow-x: hidden;
            color: #fff;
            position: relative;
            padding: 20px;
        }

        /* 动态背景光斑 */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            z-index: 0;
            animation: float 10s ease-in-out infinite;
        }
        body::before {
            background: #4CAF50;
            top: -100px;
            left: -100px;
        }
        body::after {
            background: #ff6b6b;
            bottom: -100px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 50px); }
        }

        .game-container {
            display: flex;
            align-items: stretch;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            z-index: 1;
            position: relative;
        }

        /* 通用磨砂玻璃卡片 */
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* ---------- 游戏区 ---------- */
        .game-panel {
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #4CAF50, #8BC34A, #FFC107);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
            margin-bottom: 16px;
            text-align: center;
        }

        .canvas-wrap {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(76, 175, 80, 0.3),
                        inset 0 0 0 2px rgba(255, 255, 255, 0.1);
        }

        #gameCanvas {
            display: block;
            background: #0d1b2a;
        }

        .canvas-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(10, 20, 40, 0.7);
            backdrop-filter: blur(4px);
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            color: #fff;
            letter-spacing: 2px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .canvas-overlay.show { opacity: 1; }
        .canvas-overlay span {
            padding: 12px 24px;
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.5);
            border-radius: 12px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* ---------- 控制面板 ---------- */
        .control-panel {
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-width: 240px;
        }

        .score-box {
            width: 100%;
            text-align: center;
        }

        .score-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 4px;
        }

            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #4CAF50, #8BC34A);
